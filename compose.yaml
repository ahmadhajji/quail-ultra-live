services:
  quail-ultra-live:
    build: .
    container_name: quail-ultra-live
    ports:
      - "127.0.0.1:${PORT:-3000}:3000"
    environment:
      PORT: "${PORT:-3000}"
      SESSION_SECRET: "${SESSION_SECRET}"
      ALLOW_REGISTRATION: "${ALLOW_REGISTRATION:-true}"
    volumes:
      - ./data:/app/data
    restart: unless-stopped
