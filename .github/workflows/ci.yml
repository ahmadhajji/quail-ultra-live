name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install parser dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r tools/qbank-parser/requirements.txt -r tools/qbank-parser/requirements-dev.txt

      - name: Run validation suite
        run: npm run check

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high

      - name: Validate qbank fixtures
        run: |
          npm run validate:qbank -- contracts/quail-ultra-qbank/v1/fixtures/native-pack-minimal
          npm run validate:qbank -- contracts/quail-ultra-qbank/v1/fixtures/legacy-pack-minimal

      - name: Run parser tests
        run: npm run parser:test

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build container image
        run: docker build -t quail-ultra-live-ci .

  browser-smoke:
    name: Browser Smoke
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run browser smoke suite
        env:
          CI: "true"
        run: npm run test:smoke:local

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: ignore
