[mypy]
python_version = 3.11
pretty = True
show_error_codes = True
warn_unused_configs = True
ignore_missing_imports = True
follow_imports = silent
exclude = (?x)(^venv/|^build/|^dist/|^archives/|^output/)

[mypy-main]
ignore_errors = True

[mypy-ai.*]
ignore_errors = True

[mypy-export.*]
ignore_errors = True

[mypy-parsers.*]
ignore_errors = True

[mypy-review.*]
ignore_errors = True

[mypy-stats.*]
ignore_errors = True

[mypy-app.*]
check_untyped_defs = True

[mypy-domain.*]
check_untyped_defs = True

[mypy-storage.*]
check_untyped_defs = True

[mypy-providers.*]
check_untyped_defs = True

[mypy-formatting.*]
check_untyped_defs = True
