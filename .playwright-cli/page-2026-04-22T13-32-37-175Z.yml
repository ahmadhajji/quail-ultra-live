      - main [ref=e367]:
        - generic [ref=e369]:
          - generic [ref=e371]:
            - paragraph [ref=e725]: A 52-year-old man undergoes overnight polysomnography to evaluate suspected sleep-disordered breathing. Which of the following polysomnography findings confirms the diagnosis of obstructive sleep apnea?
            - paragraph [ref=e726]:
              - strong [ref=e727]: Which polysomnography finding confirms obstructive sleep apnea?
          - generic [ref=e375]:
            - generic [ref=e377]:
              - generic [ref=e378]:
                - button "Select answer A" [disabled] [ref=e379]
                - button "A More than 15 obstructive episodes per hour" [disabled] [ref=e380]:
                  - generic [ref=e381]: A
                  - generic [ref=e382]: More than 15 obstructive episodes per hour
              - generic [ref=e383]:
                - button "Select answer B" [disabled] [ref=e384]
                - button "B Alternating apneic and hyperpneic episodes" [disabled] [ref=e385]:
                  - generic [ref=e386]: B
                  - generic [ref=e387]: Alternating apneic and hyperpneic episodes
              - generic [ref=e388]:
                - button "Select answer C" [disabled] [ref=e389]
                - button "C More than 10 seconds of breathing cessation" [disabled] [ref=e390]:
                  - generic [ref=e391]: C
                  - generic [ref=e392]: More than 10 seconds of breathing cessation
              - generic [ref=e393]:
                - button "Select answer D" [disabled] [ref=e394]
                - button "D Cessation of breathing without respiratory effort" [disabled] [ref=e395]:
                  - generic [ref=e396]: D
                  - generic [ref=e397]: Cessation of breathing without respiratory effort
              - generic [ref=e398]:
                - button "Select answer E" [disabled] [ref=e399]
                - button "E Repetitive periodic limb movements throughout the night" [disabled] [ref=e400]:
                  - generic [ref=e401]: E
                  - generic [ref=e402]: Repetitive periodic limb movements throughout the night
            - button "Back to Blocks" [ref=e404] [cursor=pointer]
          - generic [ref=e406]:
            - paragraph [ref=e728]:
              - strong [ref=e729]: "Correct Answer: A"
            - paragraph [ref=e730]:
              - strong [ref=e731]: "Explanation:"
              - text: Obstructive sleep apnea (OSA) is confirmed on polysomnography by an elevated apnea-hypopnea index (AHI) due to obstructive respiratory events (apneas/hypopneas with ongoing respiratory effort). An AHI of 15 or more events per hour is diagnostic for OSA even in the absence of additional clinical features; therefore, documenting more than 15 obstructive episodes per hour confirms the diagnosis.
            - paragraph [ref=e732]:
              - img [ref=e733]
            - paragraph [ref=e734]:
              - strong [ref=e735]: "Why other answers are incorrect:"
            - list [ref=e736]:
              - listitem [ref=e737]:
                - strong [ref=e738]: "A:"
                - text: Correct. An AHI (obstructive apneas/hypopneas) of ≥15 events/hour on polysomnography supports the diagnosis of obstructive sleep apnea.
              - listitem [ref=e739]:
                - strong [ref=e740]: "B:"
                - text: This describes periodic crescendo-decrescendo ventilation with alternating apnea and hyperpnea (Cheyne-Stokes respiration), which is more consistent with central sleep apnea (eg, in heart failure or neurologic disease) rather than obstructive sleep apnea.
              - listitem [ref=e741]:
                - strong [ref=e742]: "C:"
                - text: A cessation of breathing for ≥10 seconds defines an apnea event, but a single event (or this duration alone) does not confirm OSA; diagnosis depends on the frequency of events per hour (AHI) and whether events are obstructive vs central.
              - listitem [ref=e743]:
                - strong [ref=e744]: "D:"
                - text: Absent respiratory effort during apneic episodes indicates central sleep apnea. In OSA, airflow ceases despite continued respiratory effort due to upper airway obstruction.
              - listitem [ref=e745]:
                - strong [ref=e746]: "E:"
                - text: Periodic limb movement disorder can cause sleep fragmentation and daytime sleepiness and may be seen on polysomnography, but it is not diagnostic of obstructive sleep apnea and does not establish sleep-disordered breathing.
            - paragraph [ref=e747]:
              - strong [ref=e748]: "Educational Objective:"
              - text: Obstructive sleep apnea is confirmed on polysomnography by an elevated apnea-hypopnea index due to obstructive events (continued respiratory effort with absent/reduced airflow). An AHI ≥15 events/hour is diagnostic even without additional symptoms; central sleep apnea is suggested by apneic episodes without respiratory effort and may show Cheyne-Stokes breathing.
