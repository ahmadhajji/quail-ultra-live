[build]
builder = "RAILPACK"
buildCommand = "npm run build"

[deploy]
startCommand = "npm run start:railway"
healthcheckPath = "/api/ready"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

[variables]
NODE_ENV = "production"
QUAIL_STORAGE_BACKEND = "railway"
QUAIL_DATA_DIR = "/data"
