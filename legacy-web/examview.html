<!DOCTYPE html>
<html lang="en" style="height: 100%;">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no">
    <title>Quail Ultra Exam View</title>
    <link rel="icon" type="image/png" href="/branding/quail-ultra.png">
    <link rel="manifest" href="/manifest.webmanifest">
    <link rel="stylesheet" href="/vendor/bootstrap/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="/quail-ui.css">
</head>

<body class="q-shell" data-requires-pack="true" style="height: 100%; overflow: hidden;">
    <div class="exam-app">
        <header class="exam-topbar">
            <div class="header-left">
                <button class="nav-icon-btn" id="btn-back" type="button">
                    <!-- Simple left arrow SVG -->
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
                </button>
                <div class="exam-question-context">
                    <span id="questionMetaTop" class="context-item">Item 1 of 10</span>
                    <span id="questionIdTop" class="context-id">Question Id: </span>
                </div>
                <button id="btn-flagged" class="btn btn-header-tool" type="button">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" class="flag-icon" stroke="currentColor" stroke-width="2"><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"></path><line x1="4" y1="22" x2="4" y2="15"></line></svg>
                    Mark
                </button>
            </div>

            <div class="header-center">
                <button id="btn-prevques" class="btn btn-prevnext" type="button">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"></polyline></svg>
                    Previous
                </button>
                <button id="btn-nextques" class="btn btn-prevnext" type="button">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"></polyline></svg>
                    Next
                </button>
            </div>

            <div class="header-right">
                <div class="highlight-toolbar">
                    <button class="highlight-swatch active" data-color="#fff59d" style="background: #fff59d;" type="button"></button>
                    <button class="highlight-swatch" data-color="#ffd6a5" style="background: #ffd6a5;" type="button"></button>
                    <button class="highlight-swatch" data-color="#b8f2e6" style="background: #b8f2e6;" type="button"></button>
                    <button class="highlight-swatch" data-color="#cde7ff" style="background: #cde7ff;" type="button"></button>
                </div>
                <div id="btngrp-panes" class="btn-group header-panes" role="group"></div>
            </div>
        </header>

        <div class="exam-stage exam-stage-continuous">
            <aside class="exam-sidebar">
                <div class="exam-question-list" id="column-questions">
                    <ul id="listgroup-questions" class="list-group"></ul>
                </div>
            </aside>

            <main id="exam-workspace" class="exam-workspace exam-workspace-continuous">
                <section class="exam-panel exam-panel-continuous">
                    <!-- Headings removed from here to top bar -->
                    <div id="continuousScroll" class="exam-scroll exam-scroll-continuous">
                        <section class="exam-section">
                            <div id="leftreplace" class="exam-question-body"></div>
                        </section>

                        <section class="exam-section exam-answer-section">
                            <div class="exam-choices-container">
                                <div id="btngrp-choices" class="exam-choice-list"></div>
                            </div>
                            <div class="exam-cta-row exam-cta-row-bottom">
                                <button class="btn btn-primary btn-submit-uw" id="btn-submit-answer" type="button">Submit</button>
                                <button class="btn btn-secondary btn-nextques exam-hidden" id="btn-nextques-inline" type="button">Next Question</button>
                            </div>
                        </section>

                        <section id="explanationSection" class="exam-section exam-explanation-section exam-hidden">
                            <div class="exam-section-header">
                                <div>
                                    <p class="exam-panel-title mb-1">Explanation</p>
                                    <p class="exam-panel-note mb-0" id="explanationMeta">Explanation hidden until review.</p>
                                </div>
                                <span id="reviewStatePill" class="exam-state-pill review">Review</span>
                            </div>
                            <div id="rightreplace" class="exam-explanation-body"></div>
                        </section>
                    </div>
                </section>
            </main>
        </div>

        <footer class="exam-footer">
            <div class="footer-left">
                <div class="footer-timer">
                    <span id="timeLabel" class="time-label">Block Time Elapsed: </span>
                    <span id="timep" class="time-value">00:00:00</span>
                </div>
                <div class="footer-mode">
                    <span id="modeChip" class="mode-label">TUTOR</span>
                </div>
            </div>
            
            <div class="footer-right">
                <button class="btn btn-footer-tool" id="btn-pause" type="button">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect></svg>
                    <span>Suspend</span>
                </button>
                <button class="btn btn-footer-tool" id="btn-close" type="button">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect></svg>
                    <span>End Block</span>
                </button>
            </div>
        </footer>
    </div>
</body>

<script src="/vendor/jquery/dist/jquery.min.js"></script>
<script src="/vendor/bootstrap/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/lib/live-api.js"></script>
<script src="/js/lib/live-compat.js"></script>
<script src="/TextHighlighter.js"></script>
<script src="/js/pages/examview.js"></script>
</html>
